#include <iostream>
#include <winsock2.h>
#include <string>
#include <cstring>

#pragma comment(lib, "ws2_32.lib")

// 配置参数
const std::string SERVER_IP = "117.72.115.162";
const unsigned short SERVER_PORT = 8889;
const int TIMEOUT_MS = 5000;  // 5秒超时
const int BUFFER_SIZE = 1024;

int main() {
    // 初始化Winsock
    WSADATA wsaData;
    if (WSAStartup(MAKEWORD(2, 2), &wsaData) != 0) {
        std::cerr << "WSAStartup失败，错误码: " << WSAGetLastError() << std::endl;
        return 1;
    }

    // 创建UDP套接字
    SOCKET udpSocket = socket(AF_INET, SOCK_DGRAM, IPPROTO_UDP);
    if (udpSocket == INVALID_SOCKET) {
        std::cerr << "创建套接字失败，错误码: " << WSAGetLastError() << std::endl;
        WSACleanup();
        return 1;
    }

    // 设置接收超时
    int timeout = TIMEOUT_MS;
    if (setsockopt(udpSocket, SOL_SOCKET, SO_RCVTIMEO, 
                  reinterpret_cast<const char*>(&timeout), sizeof(timeout)) == SOCKET_ERROR) {
        std::cerr << "设置超时失败，错误码: " << WSAGetLastError() << std::endl;
        closesocket(udpSocket);
        WSACleanup();
        return 1;
    }

    // 配置服务器地址
    sockaddr_in serverAddr;
    std::memset(&serverAddr, 0, sizeof(serverAddr));
    serverAddr.sin_family = AF_INET;
    serverAddr.sin_port = htons(SERVER_PORT);
    
    // 转换IP地址
    if (inet_pton(AF_INET, SERVER_IP.c_str(), &serverAddr.sin_addr) <= 0) {
        std::cerr << "无效的服务器IP地址" << std::endl;
        closesocket(udpSocket);
        WSACleanup();
        return 1;
    }

    // 准备发送数据
    std::string studentId = "2025xxxx";  // 替换为实际学号
    std::string sendData = "{\"type\": \"get_session\", \"student_id\": \"" + studentId + "\"}";
    
    // 发送数据
    int sendResult = sendto(udpSocket, sendData.c_str(), sendData.length(), 0,
                           reinterpret_cast<sockaddr*>(&serverAddr), sizeof(serverAddr));
    if (sendResult == SOCKET_ERROR) {
        std::cerr << "发送数据失败，错误码: " << WSAGetLastError() << std::endl;
        closesocket(udpSocket);
        WSACleanup();
        return 1;
    }
    
    std::cout << "已发送请求: " << sendData << std::endl;

    // 接收响应
    char recvBuffer[BUFFER_SIZE];
    sockaddr_in fromAddr;
    int fromLen = sizeof(fromAddr);
    int recvResult = recvfrom(udpSocket, recvBuffer, BUFFER_SIZE - 1, 0,
                             reinterpret_cast<sockaddr*>(&fromAddr), &fromLen);
    
    if (recvResult == SOCKET_ERROR) {
        int errorCode = WSAGetLastError();
        if (errorCode == WSAETIMEDOUT) {
            std::cerr << "接收超时，未收到服务器响应" << std::endl;
        } else {
            std::cerr << "接收数据失败，错误码: " << errorCode << std::endl;
        }
        closesocket(udpSocket);
        WSACleanup();
        return 1;
    }

    // 处理接收到的数据
    recvBuffer[recvResult] = '\0';  // 添加字符串结束符
    std::cout << "收到服务器响应: " << recvBuffer << std::endl;

    // 清理资源
    closesocket(udpSocket);
    WSACleanup();
    return 0;
}
